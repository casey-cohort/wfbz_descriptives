name: Sync figures to paper repo

on:
  push:
    branches: [main]
    paths:
      - 'figures/**'
      - '.github/workflows/sync-figures.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: laurenwilner/wfbz_disasters_paper_2026
          ssh-key: ${{ secrets.TARGET_REPO_SSH_KEY }}
          path: target

      - name: Replace tables_figures contents
        run: |
          rm -rf target/tables_figures
          mkdir -p target/tables_figures
          cp -R source/figures/. target/tables_figures/

      - name: Commit and push
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tables_figures
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync figures from wfbz_viz@${GITHUB_SHA::7}"
            git push
          fi
